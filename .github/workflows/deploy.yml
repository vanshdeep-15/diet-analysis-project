name: CI

on:
  push:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies (FORCE CLEAN INSTALL)
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy matplotlib seaborn

      - name: Check installed packages (DEBUG)
        run: |
          python -m pip list

      - name: Test import (VERY IMPORTANT)
        run: |
          python -c "import pandas; import matplotlib; import seaborn; print('Imports OK')"

      - name: Run analysis script
        run: |
          python data_analysis.py

      - name: Build Docker image
        run: |
          docker build -t diet-analysis .